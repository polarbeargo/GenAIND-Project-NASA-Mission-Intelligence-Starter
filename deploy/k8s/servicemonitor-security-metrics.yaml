apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nasa-mission-intelligence-api-security
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nasa-mission-intelligence-api
  namespaceSelector:
    any: true
  endpoints:
  - port: http
    path: /monitoring/security/prometheus
    interval: 15s
    scrapeTimeout: 10s
