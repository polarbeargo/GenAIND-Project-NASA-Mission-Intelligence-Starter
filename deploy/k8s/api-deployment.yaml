apiVersion: apps/v1
kind: Deployment
metadata:
  name: nasa-mission-intelligence-api
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nasa-mission-intelligence-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nasa-mission-intelligence-api
    spec:
      # Graceful shutdown window for rolling updates / scale-down. Must exceed the
      # preStop sleep plus the worst-case in-flight /chat turn so live requests are
      # never cut mid-flight.
      terminationGracePeriodSeconds: 45
      containers:
      - name: api
        image: nasa-mission-intelligence-api:latest
        imagePullPolicy: IfNotPresent
        # preStop runs BEFORE SIGTERM. The sleep lets Service endpoint deregistration
        # propagate across nodes (kube-proxy/iptables) so no new traffic is routed to a
        # terminating pod while the server finishes already-accepted requests.
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-openai
              key: OPENAI_API_KEY
              optional: true
        - name: OPENAI_BASE_URL
          value: "https://openai.vocareum.com/v1"
        - name: PYTHONUNBUFFERED
          value: "1"
        # Explicitly pin isolated broker lanes so evaluation and judge cannot
        # accidentally share one queue/consumer group under env drift.
        - name: EVALUATION_BROKER_STREAM
          value: "eval:jobs"
        - name: EVALUATION_BROKER_GROUP
          value: "eval-workers"
        - name: JUDGE_BROKER_STREAM
          value: "judge:jobs"
        - name: JUDGE_BROKER_GROUP
          value: "judge-workers"
        livenessProbe:
          httpGet:
            path: /monitoring/worker-pools/series
            port: http
          initialDelaySeconds: 25
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /monitoring/worker-pools/series
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1500m"
            memory: "1536Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nasa-mission-intelligence-api
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  selector:
    app.kubernetes.io/name: nasa-mission-intelligence-api
  ports:
  - name: http
    port: 8000
    targetPort: http
