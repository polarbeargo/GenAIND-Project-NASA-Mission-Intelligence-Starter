apiVersion: apps/v1
kind: Deployment
metadata:
  name: nasa-mission-intelligence-api
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nasa-mission-intelligence-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nasa-mission-intelligence-api
    spec:
      containers:
      - name: api
        image: nasa-mission-intelligence-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-openai
              key: OPENAI_API_KEY
              optional: true
        - name: OPENAI_BASE_URL
          value: "https://openai.vocareum.com/v1"
        - name: PYTHONUNBUFFERED
          value: "1"
        livenessProbe:
          httpGet:
            path: /monitoring/worker-pools/series
            port: http
          initialDelaySeconds: 25
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /monitoring/worker-pools/series
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1500m"
            memory: "1536Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nasa-mission-intelligence-api
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  selector:
    app.kubernetes.io/name: nasa-mission-intelligence-api
  ports:
  - name: http
    port: 8000
    targetPort: http
