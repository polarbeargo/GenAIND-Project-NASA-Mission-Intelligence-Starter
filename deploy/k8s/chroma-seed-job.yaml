# Bootstrap Job: seeds ChromaDB collections into the shared PVC before API pods accept traffic.
#
# Architecture role:
#   - Runs once per environment / PVC lifecycle.
#   - Idempotent: embedding_pipeline --update-mode incremental skips existing chunks,
#     so re-running this Job after a partial failure is safe.
#   - API Deployment's wait-for-collection initContainer will not release pods until
#     this Job populates the collection (see api-deployment-chroma-pvc.yaml).
#
# Apply order:
#   1. kubectl apply -f deploy/k8s/api-deployment-chroma-pvc.yaml  (creates PVC)
#   2. kubectl apply -f deploy/k8s/chroma-seed-job.yaml             (seeds data)
#   3. API pods advance through initContainer gate automatically once seeding completes.
#
# Re-seed (e.g., after new missions added):
#   kubectl delete job nasa-chroma-seed && kubectl apply -f deploy/k8s/chroma-seed-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: nasa-chroma-seed
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
    app.kubernetes.io/component: chroma-seed
spec:
  # Retry up to 3 times on transient OpenAI API or I/O failures.
  backoffLimit: 3
  # Auto-clean completed/failed Job after 1 hour so it does not clutter kubectl get jobs.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nasa-mission-intelligence-api
        app.kubernetes.io/component: chroma-seed
    spec:
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 1000
      initContainers:
      # Ensure PVC subdirectories exist before the seed container writes to them.
      - name: init-chroma-dirs
        image: busybox:1.36
        command: ["sh", "-c", "mkdir -p /chroma/chroma_db /chroma/chroma_db_openai"]
        volumeMounts:
        - name: chroma-storage
          mountPath: /chroma
      containers:
      - name: seed
        image: nasa-mission-intelligence-api:latest
        imagePullPolicy: IfNotPresent
        command:
        - uv
        - run
        - python
        - embedding_pipeline.py
        - --data-path
        - ./data_text
        - --chroma-dir
        - ./chroma_db_openai
        - --collection-name
        - nasa_space_missions_text
        - --update-mode
        - incremental
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-openai
              key: OPENAI_API_KEY
        - name: CHROMA_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-openai
              key: OPENAI_API_KEY
        - name: OPENAI_BASE_URL
          value: "https://openai.vocareum.com/v1"
        - name: PYTHONUNBUFFERED
          value: "1"
        # Disable OTEL SDK in the seed job: no Phoenix server is available in cluster
        # and span export errors would spam logs without adding value.
        - name: OTEL_SDK_DISABLED
          value: "true"
        volumeMounts:
        - name: chroma-storage
          mountPath: /app/chroma_db
          subPath: chroma_db
        - name: chroma-storage
          mountPath: /app/chroma_db_openai
          subPath: chroma_db_openai
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
      volumes:
      - name: chroma-storage
        persistentVolumeClaim:
          claimName: nasa-chroma-pvc
