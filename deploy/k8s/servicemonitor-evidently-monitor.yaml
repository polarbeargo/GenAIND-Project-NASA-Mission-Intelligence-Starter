---
# ServiceMonitor for Prometheus to scrape evidently monitoring metrics
# Integrated with kube-prometheus-stack ServiceMonitor discovery
# This enables Prometheus to automatically discover and scrape /monitoring/analytics/prometheus

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nasa-evidently-monitor
  namespace: default
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nasa-mission-intelligence-api
  endpoints:
    - port: http
      path: /monitoring/analytics/prometheus
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      relabelings:
        # Preserve pod name for tracing
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        # Preserve namespace
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        # Add job label for Prometheus
        - sourceLabels: [__meta_kubernetes_pod_labels_app_kubernetes_io_name]
          targetLabel: job
          replacement: nasa-evidently-monitor
