apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: nasa-mission-intelligence-api
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  scaleTargetRef:
    name: nasa-mission-intelligence-api
  minReplicaCount: 2
  maxReplicaCount: 20
  pollingInterval: 15
  cooldownPeriod: 180
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          selectPolicy: Max
          policies:
          - type: Percent
            value: 100
            periodSeconds: 60
          - type: Pods
            value: 4
            periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 300
          selectPolicy: Max
          policies:
          - type: Percent
            value: 30
            periodSeconds: 60
  triggers:
  # Requires Prometheus to scrape /monitoring/worker-pools/prometheus.
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
      metricName: nasa_worker_pool_queue_depth_ratio_retrieval
      query: max(nasa_worker_pool_queue_depth_ratio{stage="retrieval"})
      threshold: "0.60"
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
      metricName: nasa_worker_pool_queue_depth_ratio_generation
      query: max(nasa_worker_pool_queue_depth_ratio{stage="generation"})
      threshold: "0.60"
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
      metricName: nasa_worker_pool_rejected_total_retrieval
      query: increase(nasa_worker_pool_rejected_total{stage="retrieval"}[2m])
      threshold: "1"
