# Judge Worker Deployment
#
# Runs judge_worker.py as an independent scalable tier that consumes
# async judge jobs from the Redis stream "judge:jobs".
#
# Architecture role:
#   - Decouples LLM-as-a-Judge scoring from the API/orchestrator request path.
#   - Each replica is a named Redis consumer group member (hostname+PID),
#     so jobs distribute automatically across replicas with no coordination code.
#   - Scales independently from API, Streamlit, and evaluation workers.
#   - SIGTERM -> _RUNNING=False maps cleanly to Kubernetes pod termination.
#
# Required secret: nasa-openai (OPENAI_API_KEY)
# Required infrastructure: Redis reachable via REDIS_HOST/REDIS_PORT.
# The production-parity automation can provision an in-cluster nasa-redis service
# automatically and inject those env vars into both API and worker deployments.
#
# Activate from API side:
#   kubectl set env deploy/nasa-mission-intelligence-api \
#     JUDGE_BROKER_ENABLED=true
#
# Scale manually or via KEDA ScaledObject targeting "judge:jobs" stream length:
#   kubectl scale deploy/nasa-judge-worker --replicas=3
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nasa-judge-worker
  labels:
    app.kubernetes.io/name: nasa-judge-worker
    app.kubernetes.io/component: judge-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nasa-judge-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nasa-judge-worker
        app.kubernetes.io/component: judge-worker
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
      containers:
      - name: worker
        image: nasa-mission-intelligence-api:latest
        imagePullPolicy: IfNotPresent
        command: ["uv", "run", "python", "judge_worker.py"]
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-openai
              key: OPENAI_API_KEY
              optional: true
        - name: CHROMA_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-openai
              key: OPENAI_API_KEY
              optional: true
        - name: OPENAI_BASE_URL
          value: "https://openai.vocareum.com/v1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: JUDGE_BROKER_STREAM
          value: "judge:jobs"
        - name: JUDGE_BROKER_GROUP
          value: "judge-workers"
        - name: JUDGE_BROKER_DLQ_STREAM
          value: "judge:jobs:dlq"
        - name: ASYNC_JOB_RETENTION_SECONDS
          value: "3600"
        - name: JUDGE_WORKER_MAX_RETRIES
          value: "3"
        - name: JUDGE_WORKER_BACKOFF_BASE_SECONDS
          value: "0.5"
        - name: JUDGE_WORKER_BACKOFF_MAX_SECONDS
          value: "8.0"
        - name: JUDGE_WORKER_PROCESSING_TTL_SECONDS
          value: "300"
        - name: OTEL_SDK_DISABLED
          value: "true"
        resources:
          requests:
            cpu: "100m"
            memory: "384Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"