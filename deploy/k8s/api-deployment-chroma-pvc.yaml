apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nasa-chroma-pvc
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nasa-mission-intelligence-api
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nasa-mission-intelligence-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nasa-mission-intelligence-api
    spec:
      # Graceful shutdown window for rolling updates / scale-down. Must exceed the
      # preStop sleep plus the worst-case in-flight /chat turn so live requests are
      # never cut mid-flight.
      terminationGracePeriodSeconds: 45
      securityContext:
        fsGroup: 1000
      initContainers:
      # 1. Ensure PVC subdirectories exist (idempotent, fast).
      - name: init-chroma-dirs
        image: busybox:1.36
        command: ["sh", "-c", "mkdir -p /chroma/chroma_db /chroma/chroma_db_openai"]
        volumeMounts:
        - name: chroma-storage
          mountPath: /chroma
      # 2. Block API container startup until nasa_space_missions_text collection is present.
      #    Polls every 10s for up to 10 minutes. Works whether data was seeded by
      #    chroma-seed-job.yaml or pre-populated manually.
      - name: wait-for-collection
        image: nasa-mission-intelligence-api:latest
        imagePullPolicy: IfNotPresent
        command: ["uv", "run", "python", "-c"]
        args:
        - |
          import chromadb, sys, time
          from chromadb.config import Settings
          path = "/app/chroma_db_openai"
          collection = "nasa_space_missions_text"
          for attempt in range(60):
              try:
                  c = chromadb.PersistentClient(path, settings=Settings(anonymized_telemetry=False))
                  if any(x.name == collection for x in c.list_collections()):
                      print(f"Collection {collection!r} ready after {attempt * 10}s")
                      sys.exit(0)
                  print(f"Attempt {attempt + 1}/60: collection not yet present, retrying in 10s")
              except Exception as e:
                  print(f"Attempt {attempt + 1}/60: {e}, retrying in 10s")
              time.sleep(10)
          print("TIMEOUT: collection never became ready after 600s")
          sys.exit(1)
        env:
        - name: OTEL_SDK_DISABLED
          value: "true"
        volumeMounts:
        - name: chroma-storage
          mountPath: /app/chroma_db
          subPath: chroma_db
        - name: chroma-storage
          mountPath: /app/chroma_db_openai
          subPath: chroma_db_openai
        resources:
          requests:
            cpu: "50m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
      containers:
      - name: api
        image: nasa-mission-intelligence-api:latest
        imagePullPolicy: IfNotPresent
        # preStop runs BEFORE SIGTERM. The sleep lets Service endpoint deregistration
        # propagate across nodes (kube-proxy/iptables) so no new traffic is routed to a
        # terminating pod while the server finishes already-accepted requests.
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-openai
              key: OPENAI_API_KEY
              optional: true
        - name: CHROMA_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nasa-openai
              key: OPENAI_API_KEY
              optional: true
        - name: OPENAI_BASE_URL
          value: "https://openai.vocareum.com/v1"
        - name: PYTHONUNBUFFERED
          value: "1"
        # Explicitly pin isolated broker lanes so evaluation and judge cannot
        # accidentally share one queue/consumer group under env drift.
        - name: EVALUATION_BROKER_STREAM
          value: "eval:jobs"
        - name: EVALUATION_BROKER_GROUP
          value: "eval-workers"
        - name: JUDGE_BROKER_STREAM
          value: "judge:jobs"
        - name: JUDGE_BROKER_GROUP
          value: "judge-workers"
        # Disable OTEL SDK when no Phoenix collector is running in cluster.
        # Remove or set to "false" when you deploy a Phoenix/OTLP sidecar.
        - name: OTEL_SDK_DISABLED
          value: "true"
        volumeMounts:
        - name: chroma-storage
          mountPath: /app/chroma_db
          subPath: chroma_db
        - name: chroma-storage
          mountPath: /app/chroma_db_openai
          subPath: chroma_db_openai
        livenessProbe:
          httpGet:
            path: /monitoring/worker-pools/series
            port: http
          initialDelaySeconds: 25
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /monitoring/worker-pools/series
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1500m"
            memory: "1536Mi"
      volumes:
      - name: chroma-storage
        persistentVolumeClaim:
          claimName: nasa-chroma-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nasa-mission-intelligence-api
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  selector:
    app.kubernetes.io/name: nasa-mission-intelligence-api
  ports:
  - name: http
    port: 8000
    targetPort: http