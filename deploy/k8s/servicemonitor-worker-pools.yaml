apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nasa-mission-intelligence-api
  labels:
    app.kubernetes.io/name: nasa-mission-intelligence-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nasa-mission-intelligence-api
  namespaceSelector:
    any: true
  endpoints:
  - port: http
    path: /monitoring/worker-pools/prometheus
    interval: 15s
    scrapeTimeout: 10s
